name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Verify package signatures
        run: npm audit signatures

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify bin dispatcher
        run: node bin/nanobanana-adc --help

  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Verify plugin files exist
        run: |
          test -f .claude-plugin/plugin.json
          test -f .claude-plugin/marketplace.json
          test -f skills/nanobanana-adc/SKILL.md

      - name: Verify plugin / CLI versions are in sync with package.json
        run: |
          PKG=$(node -p "require('./package.json').version")
          PLUGIN=$(node -p "require('./.claude-plugin/plugin.json').version")
          MARKET=$(node -p "require('./.claude-plugin/marketplace.json').plugins.find(p => p.name === 'nanobanana-adc').version")
          CLI=$(grep -oE "\.version\('([^']+)'\)" src/cli.ts | sed -E "s/.*'([^']+)'.*/\1/")
          echo "package.json=$PKG plugin.json=$PLUGIN marketplace.json=$MARKET src/cli.ts=$CLI"
          if [ "$PKG" != "$PLUGIN" ] || [ "$PKG" != "$MARKET" ] || [ "$PKG" != "$CLI" ]; then
            echo "::error::plugin / CLI version out of sync with package.json. Update plugin.json, marketplace.json, and src/cli.ts to match." >&2
            exit 1
          fi

      - name: Verify SKILL.md frontmatter
        run: |
          head -1 skills/nanobanana-adc/SKILL.md | grep -q '^---$' || { echo "::error::SKILL.md must start with '---' frontmatter"; exit 1; }
          grep -q '^name: nanobanana-adc$' skills/nanobanana-adc/SKILL.md || { echo "::error::SKILL.md missing 'name: nanobanana-adc'"; exit 1; }
          grep -q '^description:' skills/nanobanana-adc/SKILL.md || { echo "::error::SKILL.md missing description"; exit 1; }

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate plugin manifest (claude plugin validate)
        run: claude plugin validate .
